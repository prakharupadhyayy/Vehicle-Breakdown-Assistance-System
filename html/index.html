<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoadRescue – Vehicle Breakdown Assistance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

<div class="auth-split">
  <!-- LEFT PANEL -->
  <div class="auth-hero">
    <div class="hero-content">
      <div class="logo-mark">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="28" stroke="var(--accent)" stroke-width="2.5"/>
          <path d="M12 34 L20 20 L40 20 L48 34 Z" stroke="var(--accent)" stroke-width="2" fill="none"/>
          <circle cx="19" cy="38" r="4" stroke="var(--accent)" stroke-width="2"/>
          <circle cx="41" cy="38" r="4" stroke="var(--accent)" stroke-width="2"/>
          <path d="M23 38 L37 38" stroke="var(--accent)" stroke-width="2"/>
          <path d="M30 20 L30 14 M30 14 L26 18 M30 14 L34 18" stroke="var(--accent-2)" stroke-width="1.5"/>
        </svg>
      </div>
      <h1 class="brand">Road<span>Rescue</span></h1>
      <p class="tagline">Stuck on the road?<br/>Help is one click away.</p>
      <div class="hero-features">
        <div class="feat"><span class="feat-icon">⚡</span><span>Instant Request</span></div>
        <div class="feat"><span class="feat-icon">📍</span><span>Live Tracking</span></div>
        <div class="feat"><span class="feat-icon">🔧</span><span>Expert Providers</span></div>
        <div class="feat"><span class="feat-icon">⭐</span><span>Rated Service</span></div>
      </div>
      <div class="hero-decoration">
        <div class="road-line"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL: Auth Forms -->
  <div class="auth-panel">
    <div class="auth-box">

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Create Account</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="tab-login" class="tab-content active">
        <div class="role-selector">
          <button class="role-btn active" data-role="user">
            <span class="role-icon">🚗</span>
            <span>User</span>
          </button>
          <button class="role-btn" data-role="provider">
            <span class="role-icon">🔧</span>
            <span>Provider</span>
          </button>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login_email" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="pass-wrap">
              <input type="password" id="login_pass" placeholder="Enter password" required/>
              <button type="button" class="pass-toggle" onclick="togglePass('login_pass')">👁</button>
            </div>
          </div>
          <div id="login_msg" class="form-msg"></div>
          <button type="submit" class="btn-primary full" id="loginBtn">
            <span>Sign In</span>
            <div class="btn-loader hidden"></div>
          </button>
        </form>
        <p class="switch-hint">Don't have an account? <a href="#" onclick="switchTab('register')">Create one</a></p>
      </div>

      <!-- REGISTER FORM -->
      <div id="tab-register" class="tab-content">
        <div class="role-selector reg-role">
          <button class="role-btn active" data-role="user" id="reg_role_user" onclick="setRegRole('user')">
            <span class="role-icon">🚗</span>
            <span>As User</span>
          </button>
          <button class="role-btn" data-role="provider" id="reg_role_prov" onclick="setRegRole('provider')">
            <span class="role-icon">🔧</span>
            <span>As Provider</span>
          </button>
        </div>

        <form id="registerForm">
          <input type="hidden" id="reg_is_provider" value="0"/>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg_name" placeholder="Your full name" required/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="reg_email" placeholder="you@example.com" required/>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="reg_phone" placeholder="10-digit number" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="pass-wrap">
              <input type="password" id="reg_pass" placeholder="Min. 6 characters" required/>
              <button type="button" class="pass-toggle" onclick="togglePass('reg_pass')">👁</button>
            </div>
          </div>
          <!-- Provider-specific fields -->
          <div id="provider_fields" class="provider-fields hidden">
            <div class="divider-label">Provider Details</div>
            <div class="form-group">
              <label>Service Type</label>
              <select id="reg_service">
                <option value="">Select service...</option>
                <option value="Towing & Recovery">Towing & Recovery</option>
                <option value="Mechanical Repair">Mechanical Repair</option>
                <option value="Tyre Replacement">Tyre Replacement</option>
                <option value="Fuel Delivery">Fuel Delivery</option>
                <option value="Battery Jump Start">Battery Jump Start</option>
                <option value="General Assistance">General Assistance</option>
              </select>
            </div>
            <div class="form-group">
              <label>Vehicle / Equipment Info</label>
              <input type="text" id="reg_vehicle" placeholder="e.g. Tow Truck - DL01AB1234"/>
            </div>
          </div>

          <div id="reg_msg" class="form-msg"></div>
          <button type="submit" class="btn-primary full" id="regBtn">
            <span>Create Account</span>
            <div class="btn-loader hidden"></div>
          </button>
        </form>
        <p class="switch-hint">Already have an account? <a href="#" onclick="switchTab('login')">Sign in</a></p>
        <p class="switch-hint small">Same email can be used for both User & Provider roles.</p>
      </div>

    </div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
